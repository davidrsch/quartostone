name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    lint-typecheck:
        name: Lint & Typecheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Typecheck
              run: npm run typecheck

            - name: Lint
              run: npm run lint

    test-unit:
        name: Unit & Integration Tests
        runs-on: ubuntu-latest
        needs: lint-typecheck
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Install pandoc
              run: sudo apt-get install -y pandoc

            - name: Configure git identity (needed for integration test repo init)
              run: |
                  git config --global user.email "ci@quartostone.test"
                  git config --global user.name "CI"

            - name: Run unit & integration tests with coverage
              run: npm run test:coverage

            - name: Upload coverage report
              uses: actions/upload-artifact@v4
              with:
                  name: coverage
                  path: coverage/
                  retention-days: 7

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: lint-typecheck
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build server & CLI
              run: npm run build

            - name: Build client
              run: npm run build:client

            - name: Upload client dist
              uses: actions/upload-artifact@v4
              with:
                  name: client-dist
                  path: dist/client/
                  retention-days: 1

    test-e2e:
        name: E2E Tests (Playwright)
        runs-on: ubuntu-latest
        needs: [test-unit, build]
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install chromium --with-deps

            - name: Install pandoc
              run: sudo apt-get install -y pandoc

            - name: Configure git identity
              run: |
                  git config --global user.email "ci@quartostone.test"
                  git config --global user.name "CI"

            - name: Download built client
              uses: actions/download-artifact@v4
              with:
                  name: client-dist
                  path: dist/client/

            - name: Run E2E tests
              run: npm run test:e2e

            - name: Upload Playwright report
              uses: actions/upload-artifact@v4
              if: always()
              continue-on-error: true
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7
