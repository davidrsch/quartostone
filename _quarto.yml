project:
  type: website
  title: "My Quartostone"

website:
  title: "My Quartostone"
  navbar:
    left:
      - text: "Home"
        href: pages/index.qmd
  sidebar:
    style: "docked"
    search: true
    contents:
      - pages/index.qmd

filters:
  - quartostone

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    include-after-body:
      text: |
        <style>
        .qs-page-footer {
          margin-top: 3rem;
          padding-top: 0.75rem;
          border-top: 1px solid var(--quarto-border-color, #dee2e6);
          font-size: 0.8em;
          color: #6c757d;
        }
        .callout.qs-callout-todo,
        .callout.qs-callout-question {
          border-left: 4px solid #6c757d;
          padding: 0.75rem 1rem;
          margin: 1rem 0;
          background: rgba(108,117,125,0.08);
          border-radius: 4px;
        }
        .callout.qs-callout-todo   { border-color: #0d6efd; background: rgba(13,110,253,0.07); }
        .callout.qs-callout-question { border-color: #6f42c1; background: rgba(111,66,193,0.07); }
        .callout-header { font-weight: 600; margin-bottom: 0.4rem; }
        </style>
